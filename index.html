<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roshana — Motion & Visual Design</title>
    <meta
      name="description"
      content="Welcome to the video editing & motion design portfolio of Roshana. Designing clarity. Building experience. Delivering impact."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
  </head>
  <body>
    <!-- ===== Header ===== -->
    <header class="site-header">
      <a class="site-header__brand" href="#hero">ROSHANA</a>

      <nav class="site-header__nav" aria-label="Primary navigation">
        <a class="site-header__link" href="#hero" data-text="Work">Work</a>
        <a class="site-header__link" href="#about" data-text="About">About</a>
        <a class="site-header__link" href="#contact" data-text="Contact">Contact</a>
      </nav>

      <span class="site-header__location">Colombo</span>
    </header>

    <main>
      <!-- ===== Hero ===== -->
      <section class="hero" id="hero">
        <div class="hero__inner">
          <p class="hero__tag">
            <span class="hero__tag-dot"></span>
            Available for freelance &amp; collabs
          </p>

          <h1 class="hero__title">
            <span class="hero__line hero__line--sans text-roll" data-text="Designing">Designing</span>
            <span class="hero__line hero__line--serif text-roll" data-text="clarity.">clarity.</span>
            <span class="hero__line hero__line--sans text-roll" data-text="Building">Building</span>
            <span class="hero__line hero__line--serif text-roll" data-text="experience.">experience.</span>
            <span class="hero__line hero__line--sans text-roll" data-text="Delivering">Delivering</span>
            <span class="hero__line hero__line--serif hero__line--accent text-roll" data-text="impact.">impact.</span>
          </h1>

          <div class="hero__meta">
            <p>Video Editing / Motion / Color</p>
            <p>Based in Colombo — Working globally</p>
          </div>
        </div>

        <div class="hero__scroll-hint">
          <span>scroll down to see</span>
          <span class="hero__scroll-line"></span>
        </div>
      </section>

      <!-- ===== Oliver Parallax Gallery ===== -->
      <section class="parallax-gallery" id="gallery">
        <div class="parallax-gallery__cols" id="parallax-cols">
          <div class="parallax-col" data-speed="0">
            <div class="parallax-item"><img src="assets/case-vodafone.png" alt="Vodafone" /></div>
            <div class="parallax-item"><img src="assets/mini-ai.png" alt="AI" /></div>
            <div class="parallax-item"><img src="assets/case-monument.png" alt="Monument" /></div>
          </div>
          <div class="parallax-col" data-speed="1">
            <div class="parallax-item"><img src="assets/mini-brand.png" alt="Brand" /></div>
            <div class="parallax-item"><img src="assets/case-chivas.png" alt="Chivas" /></div>
            <div class="parallax-item"><img src="assets/mini-commerce.png" alt="Commerce" /></div>
          </div>
          <div class="parallax-col" data-speed="2">
            <div class="parallax-item"><img src="assets/case-defence.png" alt="Defence" /></div>
            <div class="parallax-item"><img src="assets/mini-editorial.png" alt="Editorial" /></div>
            <div class="parallax-item"><img src="assets/orbit-interface.png" alt="Interface" /></div>
          </div>
          <div class="parallax-col" data-speed="3">
            <div class="parallax-item"><img src="assets/mini-mobile.png" alt="Mobile" /></div>
            <div class="parallax-item"><img src="assets/orbit-data.png" alt="Data" /></div>
            <div class="parallax-item"><img src="assets/mini-system.png" alt="System" /></div>
          </div>
        </div>
      </section>

      <!-- ===== Contact ===== -->
      <section class="contact" id="contact">
        <p class="contact__label">Get in touch</p>
        <a class="contact__email text-roll" href="mailto:hello@roshana.studio" data-text="hello@roshana.studio">
          hello@roshana.studio
        </a>
        <p class="contact__copy">&copy; 2K26 — Roshana. All rights reserved.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
